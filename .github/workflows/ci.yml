name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest tests/ -v

      - name: Run linter
        working-directory: python
        run: ruff check agentsentinel/

      - name: Type check
        working-directory: python
        run: mypy agentsentinel/ --ignore-missing-imports

  test-typescript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Build
        working-directory: typescript
        run: npm run build

      - name: Run tests
        working-directory: typescript
        run: npm test

      - name: Type check
        working-directory: typescript
        run: npm run typecheck

  lint-edge-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint Edge Functions
        run: deno lint supabase/functions/

      - name: Type-check Edge Functions
        # Exclude _shared (imported via relative paths — checked transitively).
        # Each function is checked independently so import resolution works.
        run: |
          for dir in supabase/functions/*/; do
            index="$dir/index.ts"
            if [ -f "$index" ]; then
              echo "Checking $index"
              deno check "$index" || exit 1
            fi
          done
